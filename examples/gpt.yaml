# =====================================================================
# GPT-Style Architecture Pre-Training Configuration
# Features LayerNorm, GeLU activations, projection biases, and absolute embeddings
# =====================================================================

model:
  vocab_size: 50257
  hidden_size: 768
  num_hidden_layers: 12
  num_attention_heads: 12
  num_key_value_heads: 12
  intermediate_size: 3072
  max_position_embeddings: 2048
  position_embedding_type: "absolute"   # Standard GPT absolute positions
  norm_type: "layer"                     # Standard LayerNorm
  activation_type: "gelu"                # GELU activation
  rms_norm_eps: 0.00001
  bias: true                             # Enabled projection biases
  tie_word_embeddings: true
  
parallel:
  dp_size: 1
  zero_stage: 1

data:
  dataset_path: "data/gpt_train.bin"
  validation_dataset_path: "data/gpt_val.bin"
  sequence_length: 2048
  micro_batch_size: 8
  num_workers: 4

train:
  learning_rate: 0.0006
  min_learning_rate: 0.00006
  weight_decay: 0.1
  max_steps: 10000
  warmup_steps: 1000
  grad_accum_steps: 4
  mixed_precision: "bf16"
  compile: true
  save_checkpoint: true
  checkpoint_dir: "checkpoints/gpt-style"
