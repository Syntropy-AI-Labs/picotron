# =====================================================================
# Qwen-Style Architecture Pre-Training Configuration
# Features QK-normalization, SwiGLU, and RMSNorm layers
# =====================================================================

model:
  vocab_size: 151936                     # Qwen large vocabulary size
  hidden_size: 2048
  num_hidden_layers: 24
  num_attention_heads: 16
  num_key_value_heads: 16
  intermediate_size: 5504
  max_position_embeddings: 8192
  rope_theta: 1000000.0                  # Stable frequency scaling factor
  qk_norm: true                          # Query-Key Normalization enabled
  norm_type: "rms"                       # RMSNorm layers
  activation_type: "silu"                # SwiGLU activation
  rms_norm_eps: 0.000001
  bias: true                             # Enabled projection biases (except norm)
  tie_word_embeddings: false
  
parallel:
  dp_size: 1
  zero_stage: 1

data:
  dataset_path: "data/qwen_train.bin"
  validation_dataset_path: "data/qwen_val.bin"
  sequence_length: 8192
  micro_batch_size: 2
  num_workers: 4

train:
  learning_rate: 0.0003
  min_learning_rate: 0.00003
  weight_decay: 0.1
  max_steps: 15000
  warmup_steps: 1500
  grad_accum_steps: 16
  mixed_precision: "bf16"
  compile: true
  save_checkpoint: true
  checkpoint_dir: "checkpoints/qwen-style"
