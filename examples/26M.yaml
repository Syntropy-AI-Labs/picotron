model:
  vocab_size: 32000
  hidden_size: 256
  num_hidden_layers: 12
  num_attention_heads: 8
  num_key_value_heads: 8
  intermediate_size: 768
  rms_norm_eps: 0.00001
  max_position_embeddings: 1024
  rope_theta: 10000.0
  tie_word_embeddings: false
  initializer_range: 0.02
parallel:
  dp_size: 1
  zero_stage: 0
data:
  dataset_path: "data/train.bin"
  sequence_length: 1024
  micro_batch_size: 16
  num_workers: 2
train:
  learning_rate: 0.0006
  weight_decay: 0.1
  adam_beta1: 0.9
  adam_beta2: 0.95
  adam_eps: 0.00000001
  grad_clip: 1.0
  grad_accum_steps: 1
  max_steps: 1000
  warmup_steps: 100
  min_learning_rate: 0.00006
  compile: false
  mixed_precision: "auto"
  seed: 42
  checkpoint_interval: 500
  checkpoint_dir: "checkpoints"
preprocess:
  output_path: "data/train.bin"
  tokenizer: "gpt2"
  vocab_limit: 32000
  datasets:
    - name: "HuggingFaceTB/smollm-corpus"
      source: "hf"
      config_name: "fineweb-edu-dedup"
      split: "train"
      text_key: "text"
      target_tokens: 30000000
