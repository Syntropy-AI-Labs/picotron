# =====================================================================
# LLaMA-Style Architecture Pre-Training Configuration
# Features RMSNorm, SwiGLU activations, and Grouped Query Attention (GQA)
# =====================================================================

model:
  vocab_size: 32000
  hidden_size: 4096
  num_hidden_layers: 32
  num_attention_heads: 32
  num_key_value_heads: 8                 # GQA group ratio of 4:1
  intermediate_size: 11008               # SwiGLU expansion
  max_position_embeddings: 4096
  rope_theta: 10000.0
  position_embedding_type: "rope"        # Rotary positional embeddings
  norm_type: "rms"                       # RMSNorm layers
  activation_type: "silu"                # SwiGLU activation
  rms_norm_eps: 0.000001
  bias: false                            # No linear biases
  tie_word_embeddings: false
  
parallel:
  dp_size: 1
  zero_stage: 1

data:
  dataset_path: "data/llama_train.bin"
  validation_dataset_path: "data/llama_val.bin"
  sequence_length: 4096
  micro_batch_size: 2
  num_workers: 4

train:
  learning_rate: 0.0003
  min_learning_rate: 0.00003
  weight_decay: 0.1
  max_steps: 20000
  warmup_steps: 2000
  grad_accum_steps: 8
  mixed_precision: "bf16"
  compile: true
  save_checkpoint: true
  checkpoint_dir: "checkpoints/llama-style"
