# =====================================================================
# DeepSeek-Style Architecture Pre-Training Configuration
# Features Multi-Head Latent Attention (MLA), SwiGLU, and RMSNorm
# =====================================================================

model:
  vocab_size: 102400
  hidden_size: 2048
  num_hidden_layers: 24
  num_attention_heads: 16
  num_key_value_heads: 16
  intermediate_size: 5504
  max_position_embeddings: 8192
  rope_theta: 10000.0
  use_mla: true                          # Enable Multi-head Latent Attention (MLA)
  mla_kv_lora_rank: 512
  mla_qk_lora_rank: 128
  mla_qk_rope_lora_rank: 64
  norm_type: "rms"                       # RMSNorm layers
  activation_type: "silu"                # SwiGLU activation
  rms_norm_eps: 0.000001
  bias: false                            # No linear biases
  tie_word_embeddings: false
  
parallel:
  dp_size: 1
  zero_stage: 1

data:
  dataset_path: "data/deepseek_train.bin"
  validation_dataset_path: "data/deepseek_val.bin"
  sequence_length: 8192
  micro_batch_size: 2
  num_workers: 4

train:
  learning_rate: 0.0003
  min_learning_rate: 0.00003
  weight_decay: 0.1
  max_steps: 15000
  warmup_steps: 1500
  grad_accum_steps: 16
  mixed_precision: "bf16"
  compile: true
  save_checkpoint: true
  checkpoint_dir: "checkpoints/deepseek-style"
