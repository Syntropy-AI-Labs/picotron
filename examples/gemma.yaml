# =====================================================================
# Gemma-Style Architecture Pre-Training Configuration
# Features GeGLU, RMSNorm, embedding scaling, and logit soft-capping
# =====================================================================

model:
  vocab_size: 256000                     # Gemma large vocabulary size
  hidden_size: 2048
  num_hidden_layers: 18
  num_attention_heads: 8
  num_key_value_heads: 1                 # Multi-Query Attention (MQA)
  intermediate_size: 16384               # Gemma large expansion ratio
  max_position_embeddings: 8192
  rope_theta: 10000.0
  scale_embeddings: true                 # Scale input embeddings by sqrt(hidden_size)
  logit_soft_cap: 30.0                   # Logit soft-capping threshold
  norm_type: "rms"                       # RMSNorm layers
  activation_type: "gelu"                # GeGLU activation
  rms_norm_eps: 0.000001
  bias: false                            # No linear biases
  tie_word_embeddings: true
  
parallel:
  dp_size: 1
  zero_stage: 1

data:
  dataset_path: "data/gemma_train.bin"
  validation_dataset_path: "data/gemma_val.bin"
  sequence_length: 8192
  micro_batch_size: 2
  num_workers: 4

train:
  learning_rate: 0.0003
  min_learning_rate: 0.00003
  weight_decay: 0.1
  max_steps: 15000
  warmup_steps: 1500
  grad_accum_steps: 16
  mixed_precision: "bf16"
  compile: true
  save_checkpoint: true
  checkpoint_dir: "checkpoints/gemma-style"
